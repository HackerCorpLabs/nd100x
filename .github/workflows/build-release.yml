name: Build & Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'          # tagged pushes trigger a GitHub Release
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Cancel in-flight runs of the same workflow on the same ref for PRs only.
# Never cancel a tag-build mid-flight — that's the run that produces the
# release.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Default to least-privilege at the workflow level. The `release` job opts
# back into `contents: write` for the publish step.
permissions:
  contents: read

jobs:
  build-linux:
    name: Build linux-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Build on Ubuntu 22.04 to match the documented baseline (glibc
          # 2.35); binaries run on 22.04+ without surprises. arm64 uses the
          # GitHub-hosted Ubuntu ARM runner (GA, free for public repos).
          - arch: x64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm

    steps:
      - name: Checkout (without submodules)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0   # tags are needed for any embedded version info

      - name: Install build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            pkg-config \
            libcurl4-openssl-dev \
            libncurses-dev

      - name: Initialise submodules
        run: |
          set -euo pipefail
          git submodule update --init --recursive \
            external/cJSON \
            external/libdap \
            external/libsymbols \
            template-glass/external/RetroTermWeb

      - name: Show toolchain versions
        run: |
          gcc --version | head -1
          cmake --version | head -1
          curl --version | head -1

      - name: Build release
        run: make release

      - name: Stage Linux artifact
        run: |
          set -euo pipefail
          STAGE="dist/nd100x-linux-${{ matrix.arch }}"
          mkdir -p "$STAGE"
          cp build_release/bin/nd100x "$STAGE/"
          if [ -d images ]; then
            mkdir -p "$STAGE/images"
            cp -r images/. "$STAGE/images/" 2>/dev/null || true
          fi
          cp README.md "$STAGE/" 2>/dev/null || true
          cp LICENSE   "$STAGE/" 2>/dev/null || true
          echo "=== Staged contents ==="
          ls -la "$STAGE"
          echo "=== Dynamic library deps (informational) ==="
          ldd "$STAGE/nd100x" || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nd100x-linux-${{ matrix.arch }}
          path: dist/nd100x-linux-${{ matrix.arch }}/
          if-no-files-found: error

  build-windows:
    name: Build windows-${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            msystem: MINGW64
            prefix: mingw-w64-x86_64
            mingw_bin: /mingw64/bin

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout (without submodules)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Setup MSYS2 (${{ matrix.msystem }})
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            git
            zip
            ${{ matrix.prefix }}-gcc
            ${{ matrix.prefix }}-cmake
            ${{ matrix.prefix }}-ninja
            ${{ matrix.prefix }}-pkgconf
            ${{ matrix.prefix }}-curl

      - name: Initialise submodules (tolerate libdap pin drift)
        run: |
          set -e
          # cJSON / RetroTermWeb pins are intact — initialise normally.
          git submodule update --init --recursive \
            external/cJSON \
            template-glass/external/RetroTermWeb
          # libdap and libsymbols are skipped by CMake on Windows until their
          # own Windows ports land; best-effort init so CI on Linux and any
          # later Windows re-enable still works without changing the workflow.
          git submodule update --init external/libsymbols || \
            echo "::warning::libsymbols init failed — will be skipped on Windows anyway."
          git submodule update --init external/libdap || \
            echo "::warning::libdap pin orphaned — DAP debugger disabled in this build."

      - name: Show toolchain versions
        run: |
          gcc --version | head -1
          cmake --version | head -1
          ninja --version
          pkg-config --modversion libcurl || echo "libcurl not found"

      - name: Build release
        run: make release

      - name: Stage Windows artifact
        run: |
          set -e
          STAGE="dist/nd100x-windows-${{ matrix.arch }}"
          mkdir -p "$STAGE"
          cp build_release/bin/nd100x.exe "$STAGE/"
          # Discover and copy every non-system DLL the exe depends on. This
          # catches libcurl + its transitive deps (openssl, zstd, brotli,
          # nghttp2, ...) plus the MinGW runtime (libgcc_s_seh-1, libwinpthread-1)
          # without hardcoding a list.
          ldd "$STAGE/nd100x.exe" \
            | awk '{print $3}' \
            | grep -Ei '^(/mingw64|/c/msys64/mingw64)/' \
            | sort -u \
            | while read -r dll; do
                [ -f "$dll" ] && cp "$dll" "$STAGE/"
              done
          # Ship bundled images that live in the repo.
          if [ -d images ]; then
            mkdir -p "$STAGE/images"
            cp -r images/. "$STAGE/images/" 2>/dev/null || true
          fi
          cp README.md "$STAGE/" 2>/dev/null || true
          cp LICENSE "$STAGE/" 2>/dev/null || true
          echo "=== Staged contents ==="
          ls -la "$STAGE"

      - name: Upload build artifact
        # Upload the staging DIRECTORY, not a pre-zipped file. GitHub wraps
        # artifact contents in a zip on download, so uploading a zip would
        # yield a zip-inside-a-zip. Pointing at the dir puts the exe + DLLs
        # at the root of the downloaded zip.
        uses: actions/upload-artifact@v4
        with:
          name: nd100x-windows-${{ matrix.arch }}
          path: dist/nd100x-windows-${{ matrix.arch }}/
          if-no-files-found: error

  build-riscv:
    # Cross-compile for the Milk-V Duo (CV1800B, T-Head C906, musl userspace).
    # We must use Milk-V's prebuilt musl toolchain — apt's gcc-riscv64-linux-gnu
    # links against glibc and produces binaries the Duo's musl rootfs can't run.
    name: Build linux-riscv64 (Milk-V Duo)
    runs-on: ubuntu-22.04
    env:
      # Canonical sophon mirror. Keying the cache on this URL means a URL bump
      # automatically invalidates stale toolchains.
      MILKV_HOST_TOOLS_URL: https://sophon-file.sophon.cn/sophon-prod-s3/drive/23/03/07/16/host-tools.tar.gz
      MILKV_HOST_TOOLS_DIR: ${{ github.workspace }}/.milkv/host-tools

    steps:
      - name: Checkout (without submodules)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Install host build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          # cmake + build-essential for the host-side mkptypes tool;
          # qemu-user-static + binfmt-support to smoke-test the cross-built ELF.
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            file \
            binutils \
            qemu-user-static \
            binfmt-support

      - name: Cache Milk-V host-tools toolchain
        id: milkv-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.MILKV_HOST_TOOLS_DIR }}
          # Hash the URL so a future URL bump invalidates the cache.
          key: milkv-host-tools-${{ hashFiles('.github/workflows/build-release.yml') }}-v1

      - name: Download Milk-V host-tools (cache miss)
        if: steps.milkv-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p "${MILKV_HOST_TOOLS_DIR}"
          cd "${MILKV_HOST_TOOLS_DIR}"
          echo "Downloading ${MILKV_HOST_TOOLS_URL} (~840 MB)..."
          # --retry to survive transient sophon-file flakiness; -L for redirects.
          curl -fSL --retry 5 --retry-delay 10 \
            -o host-tools.tar.gz "${MILKV_HOST_TOOLS_URL}"
          # Tarball expands to a top-level host-tools/ dir — strip it so our
          # MILKV_HOST_TOOLS points directly at the tree the toolchain expects.
          tar -xzf host-tools.tar.gz --strip-components=1
          rm host-tools.tar.gz
          ls gcc/riscv64-linux-musl-x86_64/bin/riscv64-unknown-linux-musl-gcc

      - name: Initialise submodules
        run: |
          set -euo pipefail
          # Same set as the Linux job, minus RetroTermWeb (no web UI in the
          # RISC-V build).
          git submodule update --init --recursive \
            external/cJSON \
            external/libdap \
            external/libsymbols

      - name: Show toolchain versions
        run: |
          export PATH="${MILKV_HOST_TOOLS_DIR}/gcc/riscv64-linux-musl-x86_64/bin:$PATH"
          riscv64-unknown-linux-musl-gcc --version | head -1
          cmake --version | head -1

      - name: Build release (RISC-V)
        env:
          MILKV_HOST_TOOLS: ${{ env.MILKV_HOST_TOOLS_DIR }}
          RISCV_BUILD_TYPE: Release
        run: make riscv

      - name: Inspect built ELF
        run: |
          set -euo pipefail
          BIN=build_riscv/bin/nd100x
          file "$BIN"
          readelf -h "$BIN"
          # Sanity-check: must be RISC-V and statically/musl-linked.
          file "$BIN" | grep -q "RISC-V" || { echo "::error::not a RISC-V ELF"; exit 1; }

      - name: QEMU user-mode smoke test
        # User-mode emulation can't boot the ND-100 (needs disk images and a
        # console), but it CAN exercise process startup, dynamic loader, and
        # arg parsing — enough to catch a broken cross-build.
        run: |
          set -euo pipefail
          BIN=build_riscv/bin/nd100x
          echo "=== qemu-riscv64-static --help ==="
          # --help exits non-zero in this codebase (usage prints then exit 1),
          # so just ensure it runs without segfaulting.
          qemu-riscv64-static "$BIN" --help || true
          # If the binary is dynamically linked against musl, qemu needs to find
          # the loader. The Milk-V toolchain's sysroot ships it; point QEMU at it.
          export QEMU_LD_PREFIX="${MILKV_HOST_TOOLS_DIR}/gcc/riscv64-linux-musl-x86_64/sysroot"
          qemu-riscv64-static "$BIN" --help > /tmp/help.out 2>&1 || true
          head -20 /tmp/help.out || true
          echo "smoke test completed"

      - name: Stage RISC-V artifact
        run: |
          set -euo pipefail
          STAGE="dist/nd100x-linux-riscv64"
          mkdir -p "$STAGE"
          cp build_riscv/bin/nd100x "$STAGE/"
          if [ -d images ]; then
            mkdir -p "$STAGE/images"
            cp -r images/. "$STAGE/images/" 2>/dev/null || true
          fi
          cp README.md "$STAGE/" 2>/dev/null || true
          cp LICENSE   "$STAGE/" 2>/dev/null || true
          echo "=== Staged contents ==="
          ls -la "$STAGE"
          echo "=== file ==="
          file "$STAGE/nd100x"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nd100x-linux-riscv64
          path: dist/nd100x-linux-riscv64/
          if-no-files-found: error

  build-macos:
    name: Build macos-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            runner: macos-latest    # Apple Silicon (any M-series)

    steps:
      - name: Checkout (without submodules)
        uses: actions/checkout@v4
        with:
          submodules: false
          fetch-depth: 0

      - name: Install build dependencies
        run: brew install cmake

      - name: Initialise submodules
        run: |
          set -euo pipefail
          git submodule update --init --recursive \
            external/cJSON \
            external/libdap \
            external/libsymbols \
            template-glass/external/RetroTermWeb

      - name: Show toolchain versions
        run: |
          gcc --version | head -1
          cmake --version | head -1
          curl --version | head -1

      - name: Build release
        run: make release

      - name: Stage macOS artifact
        run: |
          set -euo pipefail
          STAGE="dist/nd100x-macos-${{ matrix.arch }}"
          mkdir -p "$STAGE"
          cp build_release/bin/nd100x "$STAGE/"
          if [ -d images ]; then
            mkdir -p "$STAGE/images"
            cp -r images/. "$STAGE/images/" 2>/dev/null || true
          fi
          cp README.md "$STAGE/" 2>/dev/null || true
          cp LICENSE   "$STAGE/" 2>/dev/null || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nd100x-macos-${{ matrix.arch }}
          path: dist/nd100x-macos-${{ matrix.arch }}/
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-linux, build-windows, build-macos, build-riscv]
    runs-on: ubuntu-latest
    # Only publish on actual tag pushes — workflow_dispatch and branch
    # pushes never create a release.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package per-platform archives
        # download-artifact extracts each artifact into dist/<artifact-name>/.
        # Re-archive each one in its native format: zip for Windows, tar.gz
        # for Linux/macOS. Each archive contains a single top-level
        # nd100x-<platform>-<arch>/ directory so users see a clean folder
        # after extraction, not loose files in their cwd.
        run: |
          set -euo pipefail
          mkdir -p release
          cd dist
          for d in */; do
            name="${d%/}"
            case "$name" in
              nd100x-windows-*)
                zip -qr "../release/${name}.zip" "$name"
                ;;
              nd100x-linux-*|nd100x-macos-*)
                tar czf "../release/${name}.tar.gz" "$name"
                ;;
              *)
                echo "::warning::Unrecognised artifact $name — skipping"
                ;;
            esac
          done
          cd ..
          ls -la release/

      - name: Generate SHA256 checksums
        # Single SHA256SUMS.txt file so users can verify any download with
        # `sha256sum -c SHA256SUMS.txt`. Kept alongside the binaries on the
        # release page.
        run: |
          set -euo pipefail
          cd release
          sha256sum * > SHA256SUMS.txt
          echo "=== SHA256SUMS.txt ==="
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
